name: Fatbot CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      PIPENV_VENV_IN_PROJECT: "1"

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fatbot
          MYSQL_USER: fatbot
          MYSQL_PASSWORD: fatbot
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config default-libmysqlclient-dev
    - name: Install Pipenv
      run: |
        python -m pip install --upgrade pip
        python -m pip install pipenv
    - name: Verify lockfile
      run: pipenv verify
    - name: Cache Pipenv virtualenv
      uses: actions/cache@v4
      id: pipenv-cache
      with:
        path: .venv
        key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pipenv-
    - name: Install dependencies
      run: |
        pipenv sync --dev
      if: steps.pipenv-cache.outputs.cache-hit != 'true'
    - name: Run tests
      run: |
        pipenv run alembic upgrade head
        pipenv run pytest
    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEPLOYMENT_SERVER_HOST }}
        username: ${{ secrets.DEPLOYMENT_SERVER_USERNAME }}
        key: ${{ secrets.DEPLOYMENT_SSH_KEY }}
        script: |
          cd /home/yakninja/fatbot
          git pull
          export PIPENV_VENV_IN_PROJECT=1
          pipenv verify
          pipenv sync
          pipenv run alembic upgrade head
          sudo $(which systemctl) restart fatbot
